name: Validate Docs (PR)

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/validate-docs.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site
        run: bundle exec jekyll build
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Validate HTML (internal links, images, structure)
        run: |
          bundle exec htmlproofer _site \
            --ignore-urls "/^http:/" \
            --ignore-status-codes "999,429" \
            --no-enforce-https \
            --ignore-missing-alt \
            --allow-missing-href \
            --disable-external
        working-directory: docs

      - name: Lint Markdown
        run: npx markdownlint-cli2 "**/*.md" --config .markdownlint-cli2.jsonc
        working-directory: docs
